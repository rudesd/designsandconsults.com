<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Message Sent! | RJM Designs & Consultations</title>
  <meta name="robots" content="noindex"/>
  <link rel="icon" type="image/png" href="RJM.png"/>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Fraunces:ital,wght@0,300;0,600&family=Syne:wght@400;600;700&display=swap" rel="stylesheet"/>
  <style>
    *{box-sizing:border-box;margin:0;padding:0;}
    :root{--black:#0a0a0a;--red:#E8192C;--navy:#1B4FA8;--white:#f5f0eb;--muted:#888;--border:#252525;--font-display:'Bebas Neue',sans-serif;--font-serif:'Fraunces',serif;--font-body:'Syne',sans-serif;}
    body{background:var(--black);color:var(--white);font-family:var(--font-body);min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:2rem;text-align:center;}
    body::before{content:'';position:fixed;inset:0;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='1'/%3E%3C/svg%3E");opacity:0.04;pointer-events:none;}
    .check{width:80px;height:80px;border-radius:50%;background:rgba(232,25,44,0.1);border:2px solid var(--red);display:flex;align-items:center;justify-content:center;font-size:2rem;margin:0 auto 2rem;animation:pop 0.4s ease;}
    @keyframes pop{from{transform:scale(0.5);opacity:0;}to{transform:scale(1);opacity:1;}}
    h1{font-family:var(--font-display);font-size:clamp(3rem,8vw,6rem);letter-spacing:0.02em;line-height:0.95;margin-bottom:1rem;}
    h1 em{font-family:var(--font-serif);font-style:italic;font-weight:300;color:var(--red);}
    p{font-size:1rem;color:var(--muted);line-height:1.7;max-width:460px;margin:0 auto 2.5rem;}
    .btn{background:var(--red);color:var(--white);padding:0.9rem 2.2rem;font-family:var(--font-body);font-weight:700;font-size:0.85rem;letter-spacing:0.1em;text-transform:uppercase;text-decoration:none;display:inline-block;transition:background 0.2s;}
    .btn:hover{background:var(--navy);}
    .logo{margin-bottom:3rem;}
    .logo img{height:80px;width:auto;}
  </style>
</head>
<body>
  <div class="logo"><img src="RJM.png" alt="RJM Designs & Consultations"/></div>
  <div class="check">✓</div>
  <h1>MESSAGE<br><em>received.</em></h1>
  <p>Thanks for reaching out! Rudy will personally review your message and get back to you within 24 hours. In the meantime, feel free to explore the site.</p>
  <a href="index.html" class="btn">Back to Home</a>
</body>
</html>
